<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharepool - 跨境资源集成中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .emerald-gradient { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <!-- 导航栏 -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-emerald-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-18 flex items-center justify-between py-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-leaf text-sm"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-emerald-900">Sharepool</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="user-points-display" class="hidden items-center bg-emerald-50 px-4 py-2 rounded-2xl border border-emerald-100">
                    <i class="fas fa-coins text-emerald-600 mr-2"></i>
                    <span id="credit-count" class="text-sm font-bold text-emerald-700">1250 Credits</span>
                </div>
                <button id="logout-btn" class="hidden text-xs text-slate-400 hover:text-red-500 font-bold uppercase tracking-widest">退出</button>
            </div>
        </div>
    </nav>

    <!-- 1. 登录/注册界面 -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 p-10 bg-white rounded-[2.5rem] shadow-2xl border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-900">欢迎进入资源池</h2>
            <p class="text-slate-400 mt-2">请输入邮箱和密码，新用户将自动注册</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="您的邮箱" class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition">
            <input type="password" id="password" placeholder="设置密码" class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition">
            <button id="auth-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-emerald-700 transition shadow-lg shadow-emerald-100">立即进入 Sharepool</button>
            <p class="text-[10px] text-center text-slate-400 uppercase font-bold tracking-widest">无需邮箱验证 · 注册即登录</p>
        </div>
    </div>

    <!-- 2. 主程序界面 (默认隐藏) -->
    <div id="main-app" class="hidden">
        <header class="max-w-7xl mx-auto px-6 py-10">
            <div class="emerald-gradient rounded-[3rem] p-12 lg:p-20 text-white relative overflow-hidden shadow-2xl">
                <div class="relative z-10">
                    <h2 class="text-5xl font-black mb-4 tracking-tight">你好, <span id="user-email-name" class="text-emerald-300">Sharepooler</span></h2>
                    <p class="text-emerald-100/70 text-xl max-w-lg mb-10 leading-relaxed">您的专属跨境资源池已就绪。发布资源或点击下方按钮，开始您的获客之旅。</p>
                    <button class="bg-white text-emerald-900 px-10 py-4 rounded-2xl font-bold text-lg hover:bg-emerald-50 shadow-xl transition">点击学习 AI 获客 SOP (+50 积分)</button>
                </div>
                <div class="absolute top-0 right-0 p-20 opacity-10 rotate-12">
                    <i class="fas fa-globe-asia text-[15rem]"></i>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-3 gap-10 pb-32">
            <!-- 发布资源 -->
            <div class="lg:col-span-1">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm sticky top-28">
                    <h3 class="text-2xl font-bold mb-8 text-slate-900 tracking-tight">发布新资源</h3>
                    <div class="space-y-5">
                        <input id="p-title" type="text" placeholder="资源标题" class="w-full px-5 py-4 rounded-2xl border border-slate-50 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500">
                        <select id="p-category" class="w-full px-5 py-4 rounded-2xl border border-slate-50 bg-slate-50 outline-none">
                            <option>AI 工具</option>
                            <option>行业情报</option>
                            <option>实物资源</option>
                        </select>
                        <textarea id="p-desc" placeholder="公开描述..." class="w-full px-5 py-4 rounded-2xl border border-slate-50 bg-slate-50 outline-none h-32"></textarea>
                        <textarea id="p-hidden" placeholder="隐藏信息 (解锁可见)..." class="w-full px-5 py-4 rounded-2xl border border-emerald-50 bg-emerald-50 outline-none h-24 text-emerald-800 font-medium"></textarea>
                        <button id="p-submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg hover:bg-emerald-600 transition shadow-xl">发布并同步到云端</button>
                    </div>
                </div>
            </div>

            <!-- 资源流 -->
            <div class="lg:col-span-2 space-y-8" id="post-container">
                <div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest">正在同步云端资源池...</div>
            </div>
        </main>
    </div>

    <script>
        // Supabase 初始化 (已填入您的 Key)
        const S_URL = 'https://crmhftdnuvafkkfxcoqo.supabase.co';
        const S_KEY = 'sb_publishable_cjl5u2QY2Xuenbf1Nb918g_m5N5Dnmh';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        const loginBox = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const pointsBox = document.getElementById('user-points-display');
        const logoutBtn = document.getElementById('logout-btn');
        let user = null;

        // 1. 自动检查登录
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                user = session.user;
                renderApp();
            }
        }

        // 2. 登录/注册
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert('请输入完整信息');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                const { data: sData, error: sError } = await supabaseClient.auth.signUp({ email, password });
                if (sError) alert(sError.message);
                else { user = sData.user; renderApp(); }
            } else { user = data.user; renderApp(); }
        };

        // 3. 渲染主页面
        function renderApp() {
            loginBox.classList.add('hidden');
            mainApp.classList.remove('hidden');
            pointsBox.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            document.getElementById('user-email-name').innerText = user.email.split('@')[0];
            fetchPosts();
            fetchCredits();
        }

        // 4. 获取积分
        async function fetchCredits() {
            const { data } = await supabaseClient.from('user_points').select('credits').eq('user_id', user.id).single();
            if (data) document.getElementById('credit-count').innerText = data.credits + ' Credits';
        }

        // 5. 获取帖子
        async function fetchPosts() {
            const container = document.getElementById('post-container');
            const { data } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            if (data) {
                container.innerHTML = data.map(p => `
                    <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-500 group">
                        <div class="flex justify-between mb-6">
                            <span class="bg-emerald-50 text-emerald-600 text-[10px] font-black px-4 py-1.5 rounded-full uppercase border border-emerald-100">${p.category}</span>
                            <span class="text-xs font-bold text-slate-300 uppercase">${new Date(p.created_at).toLocaleDateString()}</span>
                        </div>
                        <h4 class="text-2xl font-black mb-4 text-slate-900 group-hover:text-emerald-700 transition">${p.title}</h4>
                        <p class="text-slate-500 leading-relaxed mb-10 text-lg">${p.description}</p>
                        <div class="flex justify-between items-center pt-8 border-t border-slate-50">
                            <div class="text-[10px] font-black text-slate-300 uppercase tracking-widest">ID: ${p.id.slice(0,8)}</div>
                            <button class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl font-bold text-sm hover:bg-emerald-600 transition shadow-lg">10 Credits 解锁</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 6. 发布
        document.getElementById('p-submit').onclick = async () => {
            const title = document.getElementById('p-title').value;
            const category = document.getElementById('p-category').value;
            const description = document.getElementById('p-desc').value;
            const hidden_content = document.getElementById('p-hidden').value;

            const { error } = await supabaseClient.from('posts').insert([{ user_id: user.id, title, category, description, hidden_content, intent: 'supply' }]);
            if (error) alert(error.message);
            else { alert('资源已同步至云端池！'); location.reload(); }
        };

        // 7. 退出
        logoutBtn.onclick = async () => { await supabaseClient.auth.signOut(); location.reload(); };

        init();
    </script>
</body>
</html>
